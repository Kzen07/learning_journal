<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Продвинутый TODO List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Мой TODO List</h1>

    <form id="todoForm">
      <input type="text" id="taskInput" placeholder="Что нужно сделать?">
      <button type="submit">Добавить</button>
    </form>

    <div id="message"></div>

    <!-- Счётчик задач -->
    <div id="counter">Задач: 0 / Выполнено: 0</div>

    <ul id="taskList"></ul>

    <!-- Кнопка очистки -->
    <button id="clearAllBtn">Очистить всё</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
